<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Login - Yojana's Fashion Hub</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-5" style="max-width: 400px;">
  <h2 class="mb-4 text-center">Login</h2>
  <form method="POST" action="/login">
    <div class="form-group">
      <label>Email</label>
      <input type="email" class="form-control form-control-sm" name="email" placeholder="Enter email" required>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" class="form-control form-control-sm" name="password" placeholder="Password" required>
    </div>
      <button type="submit" class="btn btn-primary btn-sm btn-block">Login</button>
    </form>

    <div class="text-center mt-3">
      <a href="{{ url_for('register_page') }}">Don't have an account? Sign up</a>
    </div>

</body>
</html>
