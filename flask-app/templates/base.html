<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Home Page - Yojana's Fashion Hub</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-md navbar-light" style="background-color: #c882e6;">
    <a class="navbar-brand" href="{{ url_for('home_page') }}">Yojana's Fashion Hub</a>
    <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
    </button>
        <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav mr-auto">
            <li class="nav-item active">
                <a class="nav-link text-dark" href="{{ url_for('home_page') }}">Home</a>
            </li>
            <li class="nav-item">
                <a class="nav-link text-dark" href="{{ url_for('shop_page') }}">Shop</a>
            </li>
        </ul>
    <ul class="navbar-nav">

    {% if session.get('user_name') %}
        <li class="nav-item">
            <span class="nav-link">Hello, {{ session['user_name'] }}!</span>
        </li>
        <li class="nav-item">
            <a class="nav-link text-dark" href="{{ url_for('logout') }}">Logout</a>
        </li>
    {% else %}
        <li class="nav-item">
            <a class="nav-link text-dark" href="{{ url_for('login_page') }}">Login</a>
        </li>
        <li class="nav-item">
            <a class="nav-link text-dark" href="{{ url_for('register_page') }}">Sign in</a>
        </li>
    {% endif %}
        <li class="nav-item">
            <a class="nav-link text-dark" href="{{ url_for('cart_page') }}">
                🛒 Cart <span class="badge badge-light">{{ cart_count }}</span>
            </a>
        </li>
    </ul>
    </div>
    </nav>
    <div class="container-fluid p-0">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
